<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no" />
  <title>Invader Radar</title>
  <meta name="description" content="Compagnon de chasse FlashInvaders — sans spoiler." />
  <meta name="theme-color" content="#081428" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Invader Radar" />
  <link rel="manifest" href="./manifest.webmanifest" />
  <link rel="icon" href="./icons/favicon.svg" type="image/svg+xml" />
  <link rel="apple-touch-icon" href="./icons/icon-180.png" />
  <script type="module" src="/src/main.ts"></script>
</head>
<body>
  <div id="app">
    <header class="topbar" id="topbar">
      <h1 class="large-title" id="view-title">Invader&nbsp;Radar</h1>
      <button class="icon-btn" id="btn-settings" aria-label="Réglages">
        <svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3.2"/><path d="M19.4 15a1.7 1.7 0 0 0 .34 1.87l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.7 1.7 0 0 0-1.87-.34 1.7 1.7 0 0 0-1 1.55V21a2 2 0 1 1-4 0v-.09a1.7 1.7 0 0 0-1-1.55 1.7 1.7 0 0 0-1.87.34l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06a1.7 1.7 0 0 0 .34-1.87 1.7 1.7 0 0 0-1.55-1H3a2 2 0 1 1 0-4h.09a1.7 1.7 0 0 0 1.55-1 1.7 1.7 0 0 0-.34-1.87l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06a1.7 1.7 0 0 0 1.87.34h.01a1.7 1.7 0 0 0 1-1.55V3a2 2 0 1 1 4 0v.09a1.7 1.7 0 0 0 1 1.55h.01a1.7 1.7 0 0 0 1.87-.34l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06a1.7 1.7 0 0 0-.34 1.87v.01a1.7 1.7 0 0 0 1.55 1H21a2 2 0 1 1 0 4h-.09a1.7 1.7 0 0 0-1.55 1z"/></svg>
      </button>
    </header>

    <main id="views">
      <section id="view-dashboard" class="view" data-title="Tableau de bord"></section>
      <section id="view-map" class="view view-full" data-title="Carte"></section>
      <section id="view-hunt" class="view view-full" data-title="Chasse"></section>
      <section id="view-news" class="view" data-title="Quoi de neuf"></section>
      <section id="view-settings" class="view" data-title="Réglages"></section>
    </main>

    <nav class="tabbar" id="tabbar">
      <button class="tab" data-view="dashboard" aria-label="Tableau de bord">
        <svg viewBox="0 0 24 24" width="24" height="24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"><path d="M4 20V10M10 20V4M16 20v-7M22 20H2"/></svg>
        <span>Tableau</span>
      </button>
      <button class="tab" data-view="map" aria-label="Carte">
        <svg viewBox="0 0 24 24" width="24" height="24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linejoin="round"><path d="M9 4 3 6v14l6-2 6 2 6-2V4l-6 2-6-2zM9 4v14M15 6v14"/></svg>
        <span>Carte</span>
      </button>
      <button class="tab" data-view="hunt" aria-label="Chasse">
        <svg viewBox="0 0 24 24" width="24" height="24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"><circle cx="12" cy="12" r="8"/><circle cx="12" cy="12" r="3"/><path d="M12 1v3M12 20v3M1 12h3M20 12h3"/></svg>
        <span>Chasse</span>
      </button>
      <button class="tab" data-view="news" aria-label="Quoi de neuf">
        <svg viewBox="0 0 24 24" width="24" height="24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M18 8a6 6 0 1 0-12 0c0 7-3 9-3 9h18s-3-2-3-9M10.3 21a2 2 0 0 0 3.4 0"/></svg>
        <span>Quoi de neuf</span>
        <em class="badge" id="news-badge" hidden></em>
      </button>
    </nav>
  </div>
</body>
</html>
